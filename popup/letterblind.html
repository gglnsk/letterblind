<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="letterblind.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&display=swap" rel="stylesheet">
    </head>

    <body>
        <h1>letterblind</h1>
        <form id="toggles">
            <input type="checkbox" id="hide_ratings">
            <label for="hide_ratings"> hide ratings</label><br>
            <input type="checkbox" id="hide_reviews">
            <label for="hide_reviews"> hide reviews</label><br>
            <input type="checkbox" id="hide_friend">
            <label for="hide_friend"> hide friend activity</label><br>
        </form>
        <p class="reload">reload page to see changes</p>
        <script src="popup.js"></script>
    </body>
</html>
